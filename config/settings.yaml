exchanges:
  binance:
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    testnet: true
  alpaca:
    api_key: "${ALPACA_API_KEY}"
    api_secret: "${ALPACA_API_SECRET}"
    paper: true

macro:
  fred_api_key: "${FRED_API_KEY}"

trading:
  default_risk_reward: 3.0
  max_drawdown: 0.1
  risk_per_trade: 0.01          # fraction of equity risked per trade
  max_position_fraction: 0.25   # cap on a single position's notional
  broker: paper                 # "paper" = local simulation only;
                                # "alpaca" = also submit orders to your Alpaca
                                # account (paper account when exchanges.alpaca.paper is true)
  flatten_at_close: true        # close stock positions ~5 min before the US
                                # market close so nothing carries overnight
                                # (crypto trades 24/7 and is unaffected)
  assets:
    - BTC/USDT
    - ETH/USDT
    - TSLA
    - EUR/USD

strategies:
  momentum_scalp:
    timeframe: "15m"
    conviction_threshold: "Medium"
