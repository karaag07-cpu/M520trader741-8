exchanges:
  binance:
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    testnet: true
  alpaca:
    api_key: "${ALPACA_API_KEY}"
    api_secret: "${ALPACA_API_SECRET}"
    paper: true

trading:
  default_risk_reward: 3.0
  max_drawdown: 0.1
  risk_per_trade: 0.01  # fraction of account risked per trade (stop-loss distance)
  atr_period: 14        # lookback (bars) for Average True Range
  atr_stop_mult: 2.0    # stop distance = atr_stop_mult * ATR (volatility-scaled)
  assets:
    - BTC/USDT
    - ETH/USDT
    - TSLA
    - EUR/USD

strategies:
  momentum_scalp:
    timeframe: "15m"
    conviction_threshold: "Medium"
